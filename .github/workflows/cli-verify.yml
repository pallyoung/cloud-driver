name: CLI Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Packaged CLI smoke
        run: node scripts/smoke/cli-pack-install.mjs --browser

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-smoke-screenshots
          path: output/playwright/
          if-no-files-found: ignore
